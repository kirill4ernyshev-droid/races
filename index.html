<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Race Dashboard</title>

  /* System font stack — no internet required */
</style>
<style>
  :root {
    --bg: #080808;
    --bg2: #0f0f0f;
    --bg3: #141414;
    --border: #1c1c1c;
    --border2: #242424;
    --text: #e8e8e8;
    --text2: #888;
    --text3: #444;
    --swim: #60a5fa;
    --bike: #4ade80;
    --run: #f87171;
    --power: #fbbf24;
    --total: #e8e8e8;
    --iron: #ef4444;
    --703: #3b82f6;
    --t100: #a855f7;
    --dual: #f59e0b;
    --hm: #eab308;
    --10k: #84cc16;
    --best: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; }

  /* ── HEADER ── */
  .header {
    padding: 32px 28px 24px;
    border-bottom: 0.5px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-end;
    flex-wrap: wrap; gap: 16px;
  }
  .header-left {}
  .title {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; font-weight: 800; letter-spacing: 0.02em;
    font-size: clamp(42px, 6vw, 72px);
    letter-spacing: 0.04em;
    line-height: 1;
    color: #f0f0f0;
  }
  .title span { color: var(--703); }
  .subtitle {
    font-family: 'SF Mono', SFMono-Regular, ui-monospace, 'Courier New', monospace;
    font-size: 11px; color: var(--text3);
    margin-top: 6px; letter-spacing: 0.06em;
  }
  .header-right {
    font-family: 'SF Mono', SFMono-Regular, ui-monospace, 'Courier New', monospace;
    font-size: 11px; color: var(--text3);
    text-align: right; line-height: 1.8;
  }

  /* ── STATS ── */
  .stats { display: flex; flex-wrap: wrap; gap: 1px; border-bottom: 0.5px solid var(--border); }
  .stat {
    flex: 1; min-width: 110px;
    padding: 16px 20px;
    border-right: 0.5px solid var(--border);
    background: var(--bg2);
  }
  .stat:last-child { border-right: none; }
  .stat-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .stat-value { font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; font-weight: 800; letter-spacing: 0.02em; font-size: 28px; letter-spacing: 0.04em; line-height: 1; }
  .stat-sub { font-family: 'SF Mono', SFMono-Regular, ui-monospace, 'Courier New', monospace; font-size: 9px; color: var(--text3); margin-top: 3px; }

  /* ── FILTERS ── */
  .filters {
    padding: 12px 28px;
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg2);
    position: sticky; top: 0; z-index: 10;
  }
  .filter-btn {
    background: transparent; border: 0.5px solid var(--border2);
    color: var(--text3); padding: 4px 12px; border-radius: 3px;
    font-size: 11px; cursor: pointer; font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    transition: all 0.12s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: #333; color: var(--text2); }
  .filter-btn.active { background: var(--bg3); border-color: #333; color: var(--text); }
  .filter-count { font-size: 9px; color: var(--text3); margin-left: 4px; }
  .sort-btn {
    margin-left: auto; background: transparent; border: 0.5px solid var(--border2);
    color: var(--text3); padding: 4px 12px; border-radius: 3px;
    font-size: 11px; cursor: pointer; font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  }
  .sort-btn:hover { color: var(--text2); border-color: #333; }
  .search-wrap { position: relative; margin-left: auto; display: flex; align-items: center; }
  .search-input {
    background: transparent; border: 0.5px solid var(--border2);
    color: var(--text); padding: 4px 12px 4px 30px; border-radius: 3px;
    font-size: 11px; font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif; width: 180px;
    outline: none; transition: all 0.15s;
  }
  .search-input:focus { border-color: #444; width: 220px; }
  .search-input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 9px; color: var(--text3); font-size: 12px; pointer-events: none; }
  .search-clear { position: absolute; right: 8px; color: var(--text3); font-size: 12px; cursor: pointer; display: none; }
  .search-clear:hover { color: var(--text2); }

  /* ── SECTIONS ── */
  .section { border-bottom: 0.5px solid var(--border); }
  .section-header {
    padding: 8px 28px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text3);
    background: #0a0a0a;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 0.5px solid var(--border);
  }
  .section-count { color: #222; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 820px; }
  thead th {
    font-size: 9px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 8px 10px; border-bottom: 0.5px solid var(--border);
    text-align: left; white-space: nowrap;
    background: var(--bg);
  }
  tbody tr { transition: background 0.08s; }
  tbody tr:hover { background: #111; }
  tbody td {
    padding: 11px 10px; border-bottom: 0.5px solid #0e0e0e;
    vertical-align: top; font-size: 12px;
  }
  tbody tr:last-child td { border-bottom: none; }

  /* ── CELL TYPES ── */
  .mono { font-family: 'SF Mono', SFMono-Regular, ui-monospace, 'Courier New', monospace; }
  .cell-race-name { font-weight: 600; font-size: 13px; color: #e0e0e0; margin-bottom: 4px; }
  .cell-meta { display: flex; align-items: center; gap: 6px; }
  .cell-date { font-size: 10px; color: var(--text3); font-family: 'SF Mono', SFMono-Regular, ui-monospace, 'Courier New', monospace; }
  .cell-time { font-family: 'SF Mono', SFMono-Regular, ui-monospace, 'Courier New', monospace; font-weight: 500; font-size: 13px; }
  .cell-sub { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: 'SF Mono', SFMono-Regular, ui-monospace, 'Courier New', monospace; }
  .cell-dim { font-size: 11px; color: #2e2e2e; }
  .cell-na { color: #222; font-size: 11px; }
  .cell-total { font-family: 'SF Mono', SFMono-Regular, ui-monospace, 'Courier New', monospace; font-weight: 700; font-size: 14px; }

  /* ── PILLS ── */
  .pill {
    display: inline-block; font-size: 8px; font-weight: 700;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 2px;
  }

  /* ── BEST TAG ── */
  .best {
    display: inline-block; font-size: 8px; font-weight: 800;
    color: var(--best); background: #041a0a;
    border: 0.5px solid #4ade8033;
    padding: 1px 4px; border-radius: 2px;
    margin-left: 5px; letter-spacing: 0.05em;
    vertical-align: middle;
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 48px 20px;
    color: #1e1e1e; font-family: 'SF Mono', SFMono-Regular, ui-monospace, 'Courier New', monospace; font-size: 12px;
  }

  /* ── FOOTER ── */
  .footer {
    padding: 16px 28px;
    font-family: 'SF Mono', SFMono-Regular, ui-monospace, 'Courier New', monospace; font-size: 10px;
    color: #1e1e1e; text-align: center;
    border-top: 0.5px solid var(--border);
  }

  @media (max-width: 600px) {
    .header { padding: 16px 12px 12px; flex-direction: column; gap: 8px; }
    .title { font-size: 36px; }
    .subtitle { font-size: 10px; }
    .header-right { font-size: 10px; text-align: left; }
    .stats { overflow-x: auto; flex-wrap: nowrap; }
    .stat { min-width: 100px; padding: 12px 14px; flex-shrink: 0; }
    .stat-value { font-size: 22px; }
    .filters { padding: 8px 12px; gap: 5px; position: sticky; top: 0; z-index: 10; overflow-x: auto; flex-wrap: nowrap; }
    .filter-btn { font-size: 10px; padding: 4px 9px; flex-shrink: 0; }
    .sort-btn { font-size: 10px; padding: 4px 9px; flex-shrink: 0; }
    .search-wrap { min-width: 130px; }
    .search-input { width: 130px; font-size: 10px; }
    .search-input:focus { width: 150px; }
    .section-header { padding: 8px 12px; font-size: 9px; }
    /* Table: fixed first column, scroll the rest */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; position: relative; }
    table { min-width: 680px; }
    thead th { font-size: 8.5px; padding: 6px 6px; white-space: nowrap; }
    tbody td { padding: 9px 6px; font-size: 11px; }
    .cell-race-name { font-size: 11.5px; }
    .cell-time { font-size: 12px; }
    .cell-total { font-size: 12px; }
    /* Sticky first column */
    thead th:first-child,
    tbody td:first-child {
      position: sticky; left: 0; z-index: 2;
      background: var(--bg); min-width: 110px; max-width: 110px;
    }
    thead th:first-child { background: var(--bg); z-index: 3; }
    tbody tr:hover td:first-child { background: #111; }
  }
</style>
</head>

// ─── HELPERS ───────────────────────────────────────────────────────────────
function isTri(t)  { return ["70.3","Olympic","Sprint","T100","FullIron"].indexOf(t) > -1; }
function isRun(t)  { return ["Marathon","HalfMarathon","10K","5K"].indexOf(t) > -1; }
function isDual(t) { return t === "Duathlon"; }

function g(obj, key) { return obj && obj[key] != null ? obj[key] : null; } // safe getter

function fmt(s) {
  if (!s) return "\u2014";
  var h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = Math.floor(s%60);
  if (h > 0) return h + ":" + pad(m) + ":" + pad(ss);
  return m + ":" + pad(ss);
}
function pad(n) { return n < 10 ? "0"+n : ""+n; }

var TYPE_META = {
  "70.3":         {label:"70.3",          color:"#3b82f6"},
  "FullIron":     {label:"Full Iron",     color:"#ef4444"},
  "T100":         {label:"T100",          color:"#a855f7"},
  "Olympic":      {label:"Olympic",       color:"#14b8a6"},
  "Sprint":       {label:"Sprint",        color:"#22c55e"},
  "Duathlon":     {label:"Duathlon",      color:"#f59e0b"},
  "HalfMarathon": {label:"Half Marathon", color:"#eab308"},
  "Marathon":     {label:"Marathon",      color:"#f97316"},
  "10K":          {label:"10K",           color:"#84cc16"},
  "5K":           {label:"5K",            color:"#06b6d4"},
};

function pill(type) {
  var m = TYPE_META[type] || {label:type, color:"#6b7280"};
  return '<span class="pill" style="background:'+m.color+'22;color:'+m.color+';border:0.5px solid '+m.color+'44">'+m.label+'</span>';
}
function best() { return '<span class="best">BEST</span>'; }

var FILTERS = [
  {v:"all", l:"All races"},
  {v:"FullIron", l:"Full Iron"},
  {v:"70.3", l:"70.3"},
  {v:"Olympic", l:"Olympic"},
  {v:"T100", l:"T100"},
  {v:"Duathlon", l:"Duathlon"},
  {v:"HalfMarathon", l:"Half Marathon"},
  {v:"Marathon", l:"Marathon"},
  {v:"10K", l:"10K"},
];

var currentFilter = "all";
var sortDir = "desc";
var searchQuery = "";

function paceToSeconds(pace) {
  if (!pace) return null;
  var parts = pace.split(":");
  return parseInt(parts[0]) * 60 + parseInt(parts[1]);
}

function computeBests(races) {
  var bests = {};
  var allTri  = races.filter(function(r) { return isTri(r.type); });
  var allRun  = races.filter(function(r) { return isRun(r.type); });
  var allDual = races.filter(function(r) { return isDual(r.type); });

  function minBy(arr, fn, k) {
    var s = arr.filter(function(r) { return fn(r) != null; }).sort(function(a,b) { return fn(a)-fn(b); });
    if (s[0]) bests[k] = s[0].id;
  }
  function maxBy(arr, fn, k) {
    var s = arr.filter(function(r) { return fn(r) != null; }).sort(function(a,b) { return fn(b)-fn(a); });
    if (s[0]) bests[k] = s[0].id;
  }

  minBy(allTri,  function(r) { return r.total_seconds; },                        "triTotal");
  minBy(allTri,  function(r) { return paceToSeconds(g(r.swim,"pace_per_100m")); },"swim");
  maxBy(allTri,  function(r) { return g(r.bike,"speed_kmh"); },                  "bike");
  minBy(allTri,  function(r) { return paceToSeconds(g(r.run,"pace_per_km")); },  "triRun");
  maxBy(allTri,  function(r) { return g(r.bike,"np_watts"); },                   "np");
  minBy(allRun,  function(r) { return r.total_seconds; },                        "runTotal");
  minBy(allRun,  function(r) { return paceToSeconds(g(r.run,"pace_per_km")); },  "runPace");
  minBy(allDual, function(r) { return r.total_seconds; },                        "dualTotal");
  maxBy(allDual, function(r) { return g(r.bike,"speed_kmh"); },                  "dualBike");
  maxBy(allDual, function(r) { return g(r.bike,"np_watts"); },                   "dualNp");
  return bests;
}

// ── SAFARI-SAFE CELL BUILDERS ──────────────────────────────────────────────
function npCell(r, bestId) {
  var np = g(r.bike,"np_watts"), avg = g(r.bike,"avg_watts");
  if (np) return '<div class="cell-time" style="color:var(--power)">'+np+'W'+(bestId===r.id?best():'')+
    '</div><div class="cell-sub">avg '+avg+'W</div>';
  return '<span class="cell-na">\u2014</span>';
}
function dualNpCell(r, bestId) { return npCell(r, bestId); }
function placeCell(r) {
  if (r.place_division) return '<div style="font-size:10px;color:#555;line-height:1.7">'+
    r.place_division+'/'+r.entrants_division+' div<br>'+r.place_overall+'/'+r.entrants_overall+' OA</div>';
  return '<span class="cell-na">\u2014</span>';
}
function placeOACell(r) {
  if (r.place_overall) return '<span style="font-size:10px;color:#555">'+r.place_overall+'/'+r.entrants_overall+' OA</span>';
  return '<span class="cell-na">\u2014</span>';
}
function paceCell(r, bestId) {
  var p = g(r.run,"pace_per_km");
  if (p) return '<span class="mono" style="color:var(--run);font-size:13px;font-weight:500">'+p+
    '<span style="font-size:10px;color:var(--text3)">/km</span>'+(bestId===r.id?best():'')+' </span>';
  return '<span class="cell-na">\u2014</span>';
}
function hrCell(r) {
  var hr = g(r.run,"avg_hr");
  if (hr) return '<span class="mono" style="color:var(--power);font-size:12px">'+hr+' bpm</span>';
  return '<span class="cell-na">\u2014</span>';
}

function render() {
  var count = function(t) { return RACES.filter(function(r) { return r.type===t; }).length; };
  var today = new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});

  document.getElementById("header-meta").innerHTML =
    "Generated "+today+"<br>"+RACES.length+" total races \u00b7 TrainingPeaks";

  var allTri  = RACES.filter(function(r) { return isTri(r.type); });
  var best703 = allTri.filter(function(r) { return r.type==="70.3"&&r.total_seconds; }).sort(function(a,b){return a.total_seconds-b.total_seconds;})[0];
  var bestFull= allTri.filter(function(r) { return r.type==="FullIron"&&r.total_seconds; }).sort(function(a,b){return a.total_seconds-b.total_seconds;})[0];
  var allHM   = RACES.filter(function(r) { return r.type==="HalfMarathon"&&r.total_seconds; }).sort(function(a,b){return a.total_seconds-b.total_seconds;});
  var all10K  = RACES.filter(function(r) { return r.type==="10K"&&r.total_seconds; }).sort(function(a,b){return a.total_seconds-b.total_seconds;});
  var allOly  = RACES.filter(function(r) { return r.type==="Olympic"&&r.total_seconds; }).sort(function(a,b){return a.total_seconds-b.total_seconds;});
  var allMara = RACES.filter(function(r) { return r.type==="Marathon"&&r.total_seconds; }).sort(function(a,b){return a.total_seconds-b.total_seconds;});

  var stats = [
    {label:"Total Races",        value:RACES.length,    color:"var(--text)",  sub:"all disciplines"},
    {label:"Full Iron",          value:count("FullIron"),color:"var(--iron)", sub:bestFull?"best "+fmt(bestFull.total_seconds):"\u2014"},
    {label:"70.3 Races",         value:count("70.3"),   color:"var(--703)",   sub:best703?"best "+fmt(best703.total_seconds):"\u2014"},
    {label:"Olympic",            value:count("Olympic"),color:"#14b8a6",      sub:allOly[0]?"best "+fmt(allOly[0].total_seconds):"\u2014"},
    {label:"Half Marathons",     value:count("HalfMarathon"),color:"var(--hm)",sub:allHM[0]?"best "+fmt(allHM[0].total_seconds):"\u2014"},
    {label:"Best Half Marathon", value:allHM[0]?fmt(allHM[0].total_seconds):"\u2014", color:"var(--hm)", sub:allHM[0]&&allHM[0].run?allHM[0].run.pace_per_km+"/km":""},
    {label:"Best 10K",           value:all10K[0]?fmt(all10K[0].total_seconds):"\u2014",color:"var(--10k)",sub:all10K[0]&&all10K[0].run?all10K[0].run.pace_per_km+"/km":""},
    {label:"Best Marathon",      value:allMara[0]?fmt(allMara[0].total_seconds):"\u2014",color:"#f97316",sub:allMara[0]&&allMara[0].run?allMara[0].run.pace_per_km+"/km":""},
  ];

  document.getElementById("stats-row").innerHTML = stats.map(function(s) {
    return '<div class="stat"><div class="stat-label">'+s.label+'</div>'+
      '<div class="stat-value" style="color:'+s.color+'">'+s.value+'</div>'+
      (s.sub?'<div class="stat-sub">'+s.sub+'</div>':'')+
      '</div>';
  }).join("");

  var filterBtns = FILTERS.map(function(f) {
    var c = f.v==="all" ? RACES.length : RACES.filter(function(r){return r.type===f.v;}).length;
    return '<button class="filter-btn'+(currentFilter===f.v?" active":"")+'" onclick="setFilter(\''+f.v+'\')">'+
      f.l+'<span class="filter-count">'+c+'</span></button>';
  }).join("");

  document.getElementById("filters-row").innerHTML = filterBtns +
    '<button class="sort-btn" onclick="toggleSort()" style="margin-left:0">'+(sortDir==="desc"?"\u2193 Newest":"\u2191 Oldest")+'</button>'+
    '<div class="search-wrap">'+
    '<span class="search-icon">&#8981;</span>'+
    '<input class="search-input" id="race-search" type="text" placeholder="Search races\u2026" oninput="onSearch(this)" value="'+searchQuery+'">'+
    '<span class="search-clear" id="search-clear" onclick="clearSearch()" style="display:'+(searchQuery?'block':'none')+'">&times;</span>'+
    '</div>';

  var filtered = currentFilter === "all" ? RACES.slice() : RACES.filter(function(r){return r.type===currentFilter;});
  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    filtered = filtered.filter(function(r) {
      return r.name.toLowerCase().indexOf(q) > -1 || r.date.indexOf(q) > -1 || (r.type||"").toLowerCase().indexOf(q) > -1;
    });
  }
  filtered.sort(function(a,b) {
    return sortDir==="desc" ? new Date(b.date)-new Date(a.date) : new Date(a.date)-new Date(b.date);
  });

  var bests = computeBests(filtered);
  var triRaces  = filtered.filter(function(r) { return isTri(r.type); });
  var dualRaces = filtered.filter(function(r) { return isDual(r.type); });
  var runRaces  = filtered.filter(function(r) { return isRun(r.type); });

  var html = "";

  // ── TRI TABLE
  if (triRaces.length) {
    html += '<div class="section"><div class="section-header">\uD83C\uDFC5 Triathlons <span class="section-count">'+triRaces.length+'</span></div>'+
      '<div class="table-wrap"><table><thead><tr>'+
      '<th style="width:18%">Race</th>'+
      '<th style="color:var(--swim)">&#x1F3CA; Swim</th>'+
      '<th>T1</th>'+
      '<th style="color:var(--bike)">&#x1F6B4; Bike</th>'+
      '<th style="color:var(--power)">NP</th>'+
      '<th>Elev</th>'+
      '<th>T2</th>'+
      '<th style="color:var(--run)">&#x1F3C3; Run</th>'+
      '<th>Total</th>'+
      '<th>Place</th>'+
      '</tr></thead><tbody>';

    triRaces.forEach(function(r) {
      var swim = r.swim || {};
      var bike = r.bike || {};
      var run  = r.run  || {};
      var t1   = r.t1   || {};
      var t2   = r.t2   || {};
      html +=
        '<tr>'+
        '<td><div class="cell-race-name">'+r.name+'</div>'+
          '<div class="cell-meta"><span class="cell-date">'+r.date.slice(0,7)+'</span>'+pill(r.type)+'</div></td>'+
        '<td><div class="cell-time" style="color:var(--swim)">'+fmt(swim.seconds)+(bests.swim===r.id?best():'')+
          '</div><div class="cell-sub">'+(swim.pace_per_100m?swim.pace_per_100m+"/100m":"")+
          '</div><div class="cell-sub">'+(swim.distance_km?swim.distance_km+"km":"")+'</div></td>'+
        '<td><span class="cell-dim">'+fmt(t1.seconds)+'</span></td>'+
        '<td><div class="cell-time" style="color:var(--bike)">'+fmt(bike.seconds)+(bests.bike===r.id?best():'')+
          '</div><div class="cell-sub">'+(bike.speed_kmh?bike.speed_kmh.toFixed(1)+" km/h":"")+
          '</div><div class="cell-sub">'+(bike.distance_km?bike.distance_km+"km":"")+'</div></td>'+
        '<td>'+npCell(r,bests.np)+'</td>'+
        '<td><span class="mono" style="color:#666;font-size:12px">'+(bike.elevation_m!=null?bike.elevation_m.toLocaleString()+"m":"\u2014")+'</span></td>'+
        '<td><span class="cell-dim">'+fmt(t2.seconds)+'</span></td>'+
        '<td><div class="cell-time" style="color:var(--run)">'+fmt(run.seconds)+(bests.triRun===r.id?best():'')+
          '</div><div class="cell-sub">'+(run.pace_per_km?run.pace_per_km+"/km":"")+
          '</div><div class="cell-sub">'+(run.distance_km?run.distance_km+"km":"")+'</div></td>'+
        '<td><div class="cell-total">'+fmt(r.total_seconds)+(bests.triTotal===r.id?best():'')+'</div></td>'+
        '<td>'+placeCell(r)+'</td>'+
        '</tr>';
    });
    html += '</tbody></table></div></div>';
  }

  // ── DUATHLON TABLE
  if (dualRaces.length) {
    html += '<div class="section"><div class="section-header">&#9889; Duathlon <span class="section-count">'+dualRaces.length+'</span></div>'+
      '<div class="table-wrap"><table><thead><tr>'+
      '<th style="width:20%">Race</th>'+
      '<th style="color:var(--run)">&#x1F3C3; Run 1</th>'+
      '<th>T1</th>'+
      '<th style="color:var(--bike)">&#x1F6B4; Bike</th>'+
      '<th style="color:var(--power)">NP</th>'+
      '<th>Elev</th>'+
      '<th>T2</th>'+
      '<th style="color:var(--run)">&#x1F3C3; Run 2</th>'+
      '<th>Total</th>'+
      '<th>Place</th>'+
      '</tr></thead><tbody>';

    dualRaces.forEach(function(r) {
      var bike = r.bike || {};
      var t1   = r.t1   || {};
      var t2   = r.t2   || {};
      var run1 = r.run1 || {};
      var run2 = r.run2 || {};
      html +=
        '<tr>'+
        '<td><div class="cell-race-name">'+r.name+'</div>'+
          '<div class="cell-meta"><span class="cell-date">'+r.date.slice(0,7)+'</span>'+pill(r.type)+'</div></td>'+
        '<td><div class="cell-time" style="color:var(--run)">'+fmt(run1.seconds)+
          '</div><div class="cell-sub">'+(run1.pace_per_km?run1.pace_per_km+"/km":"")+
          '</div><div class="cell-sub">'+(run1.distance_km?run1.distance_km.toFixed(1)+"km":"")+'</div></td>'+
        '<td><span class="cell-dim">'+fmt(t1.seconds)+'</span></td>'+
        '<td><div class="cell-time" style="color:var(--bike)">'+fmt(bike.seconds)+
          '</div><div class="cell-sub">'+(bike.speed_kmh?bike.speed_kmh.toFixed(1)+" km/h":"")+
          '</div><div class="cell-sub">'+(bike.distance_km?bike.distance_km.toFixed(1)+"km":"")+'</div></td>'+
        '<td>'+dualNpCell(r,bests.dualNp)+'</td>'+
        '<td><span class="mono" style="color:#666;font-size:12px">'+(bike.elevation_m!=null?bike.elevation_m+"m":"\u2014")+'</span></td>'+
        '<td><span class="cell-dim">'+fmt(t2.seconds)+'</span></td>'+
        '<td><div class="cell-time" style="color:var(--run)">'+fmt(run2.seconds)+
          '</div><div class="cell-sub">'+(run2.pace_per_km?run2.pace_per_km+"/km":"")+
          '</div><div class="cell-sub">'+(run2.distance_km?run2.distance_km.toFixed(1)+"km":"")+'</div></td>'+
        '<td><div class="cell-total">'+fmt(r.total_seconds)+(bests.dualTotal===r.id?best():'')+'</div></td>'+
        '<td><span class="cell-na">\u2014</span></td>'+
        '</tr>';
    });
    html += '</tbody></table></div></div>';
  }

  // ── RUN TABLE
  if (runRaces.length) {
    html += '<div class="section"><div class="section-header">&#x1F3C3; Running <span class="section-count">'+runRaces.length+'</span></div>'+
      '<div class="table-wrap"><table><thead><tr>'+
      '<th style="width:35%">Race</th>'+
      '<th>Distance</th><th>Time</th>'+
      '<th style="color:var(--run)">Pace</th>'+
      '<th>Avg HR</th><th>Place</th>'+
      '</tr></thead><tbody>';

    runRaces.forEach(function(r) {
      var run = r.run || {};
      html +=
        '<tr>'+
        '<td><div class="cell-race-name">'+r.name+'</div>'+
          '<div class="cell-meta"><span class="cell-date">'+r.date.slice(0,7)+'</span>'+pill(r.type)+'</div></td>'+
        '<td><span style="font-size:12px;color:#666">'+(run.distance_km?run.distance_km.toFixed(1):"\u2014")+" km</span></td>"+

        '<td>'+hrCell(r)+'</td>'+
        '<td>'+placeOACell(r)+'</td>'+
        '</tr>';
    });
    html += '</tbody></table></div></div>';
  }

  if (!filtered.length) html = '<div class="empty">No races found'+(searchQuery?' for &ldquo;'+searchQuery+'&rdquo;':' for this filter')+'.</div>';

  document.getElementById("content").innerHTML = html;
  document.getElementById("footer-text").textContent =
    "Race Dashboard \u00b7 "+RACES.length+" races \u00b7 Generated "+today+" \u00b7 Data from TrainingPeaks";
}

function setFilter(v) { currentFilter = v; render(); }
function toggleSort() { sortDir = sortDir === "desc" ? "asc" : "desc"; render(); }
function onSearch(el) {
  searchQuery = el.value;
  var clr = document.getElementById("search-clear");
  if (clr) clr.style.display = searchQuery ? "block" : "none";
  render();
  var input = document.getElementById("race-search");
  if (input) { input.focus(); }
}
function clearSearch() { searchQuery = ""; render(); }

render();
</script>
